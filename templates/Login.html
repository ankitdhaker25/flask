<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

<div class="auth-container">

<h2>Login</h2>

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="flash-message" style="color: #ef4444; background-color: #fef2f2; border: 1px solid #fee2e2; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; font-weight: bold;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST" id="form">

<input
type="hidden"
name="csrf_token"
value="{{ csrf_token() }}">

<input
id="email"
type="email"
name="email"
placeholder="Email"
required>

<input
id="password"
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="extra-links">

<a href="{{ url_for('forgot_password') }}">
Forgot Password?
</a>

</div>

<footer>
<p>© 2026 Flask Project</p>
</footer>

</div>

<script>
document.getElementById('form').addEventListener('submit', function(e) {

    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!email || !pass) {
        alert('All fields are required!');
        e.preventDefault();
    }

});
</script>

</body>
</html>
