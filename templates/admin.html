<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #00bcd4;
            color: white;
        }

        .delete {
            color: white;
            background: red;
            padding: 6px 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .delete:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🔥 Admin Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Total Users: {{ users|length }}</h2>
    </div>
<form method="GET" action="{{ url_for('admin_dashboard') }}" style="margin-bottom:20px;">

    <input 
        type="text" 
        name="search" 
        placeholder="Search by username or email"
        value="{{ search if search else '' }}"
        style="padding:10px;width:250px;"
    >

    <button type="submit" style="padding:10px;">
        Search
    </button>

    <a href="{{ url_for('admin_dashboard') }}">
        Clear
    </a>

</form>
    <div class="card">

        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>

            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.role }}</td>
                <td>

                    <form
                        method="POST"
                        action="{{ url_for('delete_user', id=u.id) }}"
                        onsubmit="return confirm('Are you sure you want to delete this user?');"
                        style="margin:0;"
                    >
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <button class="delete" type="submit">
                            Delete
                        </button>

                    </form>

                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
